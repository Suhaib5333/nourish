name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 */5 * *'  # Every 5 days at 8am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/food_map?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "Response code: $response"
          if [ "$response" -ne 200 ]; then
            echo "::warning::Supabase returned $response"
            exit 1
          fi
          echo "Supabase is alive!"
